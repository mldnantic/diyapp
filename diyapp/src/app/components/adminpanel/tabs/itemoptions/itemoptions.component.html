<mat-card appearance="outlined" class="margine">
    <div class="opcija">
        <mat-form-field class="margine">
            <mat-label>Category</mat-label>
            <mat-select (selectionChange)="onSelectionChange($event)">
                @for (c of categories; track c.id) {
                <mat-option [value]="c.id">{{c.name}}</mat-option>
                }
            </mat-select>
        </mat-form-field>
        <mat-form-field class="margine">
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="itemName">
        </mat-form-field>
        <mat-form-field class="margine">
            <mat-label>Price</mat-label>
            <input matInput [(ngModel)]="itemPrice">
        </mat-form-field>
        <button matButton="filled" class="margine" (click)="addItem()">Add item</button>
    </div>
</mat-card>
<mat-grid-list cols="4" [rowHeight]="appBodyHeight">
    <mat-grid-tile colspan="1">
        <div class="itemSearch">
            <mat-card appearance="outlined" class="margine">

                <mat-form-field>
                    <mat-label>Search by name</mat-label>
                    <input matInput [(ngModel)]="searchQuery">
                    <button mat-icon-button matSuffix (click)="onSearch()">
                        <mat-icon>search</mat-icon>
                    </button>
                </mat-form-field>

                <mat-card-title>Select categories</mat-card-title>
                <mat-selection-list #categorySelectionList (selectionChange)="onFilterSelection(categorySelectionList)">
                    @for (c of categories; track c.id) {
                    <mat-list-option [value]="c.id">{{c.name}}</mat-list-option>
                    }
                </mat-selection-list>

                <button matButton="filled" (click)="onResetFilter()">Reset</button>
            </mat-card>
        </div>
    </mat-grid-tile>
    <mat-grid-tile colspan="3" class="skrol">
        <div class="maxWidthHeight">
            <mat-grid-list cols="3" [rowHeight]="rowHeight">
                @for(i of items; track i.id)
                {
                <mat-grid-tile>
                    <mat-card appearance="outlined" class="list">
                        <div class="part">
                            <mat-card-title>
                                {{i.name}}
                            </mat-card-title>
                            <h3>
                                {{i.price}} RSD
                            </h3>
                            <div class="rowButtons">
                                <button matButton="filled" [routerLink]="['/itemedit', i.id]">Edit item</button>
                            </div>
                        </div>
                    </mat-card>
                </mat-grid-tile>
                }
            </mat-grid-list>
        </div>
    </mat-grid-tile>
</mat-grid-list>
