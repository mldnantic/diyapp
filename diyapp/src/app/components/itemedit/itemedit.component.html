@if(item$ | async; as item)
{
<div class="itempage">
    <mat-card appearance="outlined" class="margine">
        <mat-card-header>
            <h1>{{item.name}}</h1>
        </mat-card-header>
        <div class="margine">
            <button matButton="filled" (click)="openItemDialog({fieldName: 'name', id: item.id, name: item.name})">
                Rename item</button>
        </div>

        <div class="rowCards">
            <mat-card appearance="outlined" class="editTable">
                <div class="rowCards">
                    <h2>{{item.price}} RSD</h2>
                    <button matButton="filled" class="margine"
                        (click)="openItemDialog({fieldName: 'price', id: item.id, name: item.name})">
                        Update price</button>
                </div>
                <table mat-table [dataSource]="tableData$" class="mat-elevation-z8">
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef>Property name</th>
                        <td mat-cell *matCellDef="let element">{{element.propertyName}}</td>
                    </ng-container>
                    <ng-container matColumnDef="value">
                        <th mat-header-cell *matHeaderCellDef>Value</th>
                        <td mat-cell *matCellDef="let element">
                            <p class="limitWidth">{{element.value}}</p>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="options">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let element">
                            <button matButton="filled"
                                (click)="openItemDialog({fieldName: 'value', id: element.valueId, name: element.propertyName})">
                                Update value</button>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
            </mat-card>
            <mat-card appearance="outlined" class="editImage">
                <mat-card-header class="margine">
                    <input type="file" (change)="onFileSelected($event)" />
                </mat-card-header>
                <mat-card-content>
                    <img mat-card-image [src]="api+'/'+item.image" class="limitWidth">
                </mat-card-content>
                <mat-card-actions>
                    <button matButton="filled" (click)="onUpload()">Upload Image</button>
                </mat-card-actions>
            </mat-card>
        </div>
    </mat-card>
</div>
}
