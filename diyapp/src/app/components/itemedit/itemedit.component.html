@if(item$ | async; as item)
{
<mat-card appearance="outlined" class="margine">
    <mat-card-header>
        <h1>{{item.name}}</h1>
    </mat-card-header>
    <div class="rowButtons">
        <h2>{{item.price}} RSD</h2>
        <button matButton="filled" class="margine"
            (click)="openItemDialog({fieldName: 'price', id: item.id, name: item.name})">
            Update price</button>
    </div>
    <mat-card appearance="outlined" class="margine">

        <table mat-table [dataSource]="tableData" class="mat-elevation-z8">

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Property name</th>
                <td mat-cell *matCellDef="let element">{{element.propertyName}}</td>
            </ng-container>

            <ng-container matColumnDef="value">
                <th mat-header-cell *matHeaderCellDef>Value</th>
                <td mat-cell *matCellDef="let element">{{element.value}}</td>
            </ng-container>

            <ng-container matColumnDef="options">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let element">
                    <button matButton="filled"
                        (click)="openItemDialog({fieldName: 'value', id: element.valueId, name: element.propertyName})">Update
                        value</button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </mat-card>
</mat-card>
}
