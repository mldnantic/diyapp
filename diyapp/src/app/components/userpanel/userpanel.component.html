<div class="userpanel">
    <mat-card appearance="outlined" class="panelCard">
        <div class="rowCards">
            <mat-card appearance="outlined" class="userCard">
                <h1>
                    {{username}}
                </h1>

                <p>E-mail: {{email}}</p>

                <div class="columnButtons">
                    @if(role == 'admin') {
                    <button matButton="outlined" (click)="navToAdminPanel()">Admin panel</button>
                    }
                    @if(role == 'admin' || role == 'moderator') {
                    <button matButton="outlined" (click)="navToModeratorPanel()">Moderator panel</button>
                    }
                    <button matButton="filled" (click)="createProject()">Create project</button>
                </div>
            </mat-card>
            <div class="userDashboard">
                <div class="logOutHeader">
                    <button matButton="filled" (click)="logout()">Log out</button>
                    <h1>My projects</h1>
                </div>
                <div>
                    @if(projects$ | async; as projects ) {
                    <mat-card appearance="outlined" class="projekti">
                        @if(projects.length == 0) {
                            <h2>You don't have any projects</h2>
                        }
                        @for(p of projects; track p.id) {
                        <mat-card appearance="outlined">
                            <div class="rowCards">
                                <h2 class="projectButton">{{p.name}}</h2>
                                <button matButton="filled" class="projectButton" [routerLink]="['/project', p.id]">View project</button>
                                <button matButton="filled" class="projectButton" (click)="deleteProject(p.id)">Delete project</button>
                            </div>
                        </mat-card>
                        }
                    </mat-card>
                    }
                </div>
            </div>
        </div>
    </mat-card>
</div>
